AWSTemplateFormatVersion: '2010-09-09'
Description: SAMLdecode static site - S3 + CloudFront + Route53 + ACM

Parameters:
  HostedZoneId:
    Type: String
    Default: Z33QVR4S16MSXY
    Description: Route 53 hosted zone ID
  DomainSuffix:
    Type: String
    Default: carriagereturn.nl
    Description: Base domain (e.g. carriagereturn.nl)

Resources:

  # ── S3 Bucket ──────────────────────────────────────────────────────────────
  Bucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── Origin Access Control ──────────────────────────────────────────────────
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── Bucket Policy (allow CloudFront OAC) ──────────────────────────────────
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${Bucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

  # ── ACM Certificate (must be us-east-1 for CloudFront) ────────────────────
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub '${AWS::StackName}.${DomainSuffix}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub '${AWS::StackName}.${DomainSuffix}'
          HostedZoneId: !Ref HostedZoneId

  # ── CloudFront Distribution ────────────────────────────────────────────────
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Aliases:
          - !Sub '${AWS::StackName}.${DomainSuffix}'
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt Bucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Comment: !Sub '${AWS::StackName}.${DomainSuffix}'

  # ── Route 53 Alias Record ──────────────────────────────────────────────────
  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub '${AWS::StackName}.${DomainSuffix}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # Fixed CloudFront hosted zone ID
        EvaluateTargetHealth: false


Outputs:
  BucketName:
    Value: !Ref Bucket
    Description: S3 bucket name

  CloudFrontDistributionId:
    Value: !Ref Distribution
    Description: CloudFront distribution ID (used for cache invalidation)

  CloudFrontDomain:
    Value: !GetAtt Distribution.DomainName
    Description: Raw CloudFront domain (for debugging)

  SiteURL:
    Value: !Sub 'https://${AWS::StackName}.${DomainSuffix}'
    Description: Live site URL
