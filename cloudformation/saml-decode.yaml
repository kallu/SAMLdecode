AWSTemplateFormatVersion: '2010-09-09'
Description: SAMLdecode static site - S3 + CloudFront + Route53 + ACM + GitHub Actions OIDC

Resources:

  # ── S3 Bucket ──────────────────────────────────────────────────────────────
  Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: saml-decode-carriagereturn-nl
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── Origin Access Control ──────────────────────────────────────────────────
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: saml-decode-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── Bucket Policy (allow CloudFront OAC) ──────────────────────────────────
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${Bucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

  # ── ACM Certificate (must be us-east-1 for CloudFront) ────────────────────
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: saml-decode.carriagereturn.nl
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: saml-decode.carriagereturn.nl
          HostedZoneId: Z33QVR4S16MSXY

  # ── CloudFront Distribution ────────────────────────────────────────────────
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Aliases:
          - saml-decode.carriagereturn.nl
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt Bucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Comment: saml-decode.carriagereturn.nl

  # ── Route 53 Alias Record ──────────────────────────────────────────────────
  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: Z33QVR4S16MSXY
      Name: saml-decode.carriagereturn.nl
      Type: A
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # Fixed CloudFront hosted zone ID
        EvaluateTargetHealth: false

  # ── GitHub Actions OIDC Provider ───────────────────────────────────────────
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  # ── IAM Role for GitHub Actions ───────────────────────────────────────────
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: saml-decode-github-actions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: repo:kallu/SAMLdecode:ref:refs/heads/master
      Policies:
        - PolicyName: saml-decode-deploy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # S3 access for the specific bucket
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObject
                Resource: !Sub '${Bucket.Arn}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt Bucket.Arn
              # CloudFront invalidation for the specific distribution
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'
              # CloudFormation stack management
              - Effect: Allow
                Action:
                  - cloudformation:*
                Resource: !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/saml-decode/*'
              # CloudFormation needs to describe stacks for outputs
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:ListStacks
                Resource: '*'
              # Permissions for CloudFormation to manage infra resources
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPolicy
                  - s3:GetBucketLocation
                  - s3:GetBucketPublicAccessBlock
                Resource: !GetAtt Bucket.Arn
              - Effect: Allow
                Action:
                  - cloudfront:GetDistribution
                  - cloudfront:CreateDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:DeleteDistribution
                  - cloudfront:TagResource
                  - cloudfront:GetOriginAccessControl
                  - cloudfront:CreateOriginAccessControl
                  - cloudfront:UpdateOriginAccessControl
                  - cloudfront:DeleteOriginAccessControl
                  - cloudfront:ListDistributions
                Resource: '*'
              - Effect: Allow
                Action:
                  - acm:RequestCertificate
                  - acm:DescribeCertificate
                  - acm:DeleteCertificate
                  - acm:ListCertificates
                Resource: '*'
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                Resource: 'arn:aws:route53:::hostedzone/Z33QVR4S16MSXY'
              - Effect: Allow
                Action:
                  - route53:GetChange
                Resource: 'arn:aws:route53:::change/*'
              - Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:PassRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:TagRole
                  - iam:GetOpenIDConnectProvider
                  - iam:CreateOpenIDConnectProvider
                  - iam:DeleteOpenIDConnectProvider
                  - iam:UpdateOpenIDConnectProviderThumbprint
                Resource: '*'

Outputs:
  BucketName:
    Value: !Ref Bucket
    Description: S3 bucket name

  CloudFrontDistributionId:
    Value: !Ref Distribution
    Description: CloudFront distribution ID (used for cache invalidation)

  CloudFrontDomain:
    Value: !GetAtt Distribution.DomainName
    Description: Raw CloudFront domain (for debugging)

  SiteURL:
    Value: https://saml-decode.carriagereturn.nl
    Description: Live site URL
