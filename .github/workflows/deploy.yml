name: Deploy

on:
  push:
    branches: [master]

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::430997289407:role/saml-decode-github-actions
          aws-region: us-east-1

      - name: Deploy CloudFormation stack
        run: |
          set +e
          output=$(aws cloudformation deploy \
            --stack-name saml-decode \
            --template-file cloudformation/saml-decode.yaml \
            --capabilities CAPABILITY_IAM \
            --region us-east-1 \
            --no-fail-on-empty-changeset 2>&1)
          exit_code=$?
          echo "$output"
          if [ $exit_code -ne 0 ]; then
            echo "$output" | grep -qE "OBSOLETE|No changes to deploy" && exit 0 || exit $exit_code
          fi

      - name: Get stack outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name saml-decode --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name saml-decode --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          echo "BUCKET=$BUCKET" >> $GITHUB_ENV
          echo "DIST_ID=$DIST_ID" >> $GITHUB_ENV

      - name: Upload files to S3
        run: |
          for f in index.html jquery-3.7.1.min.js base64.js rawinflate.js rawdeflate.js uneval.js formatxml.js; do
            aws s3 cp $f s3://$BUCKET/$f --region us-east-1
          done

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
